<script>
    $(function() {
        $("a[href='#kitchen-timing-table']").one('shown', function(e) {

            Toast.reporting.augmentTable("kitchen-details-report", {
                "sAjaxSource": "/restaurantkitchenreports/kitchendetailstable",
                "excelExportUrl": "/restaurantkitchenreports/kitchendetailstable?excel=true",
                "async": true,
                "oLanguage": {
                    "sLengthMenu": "_MENU_ items per page",
                    "sZeroRecords": "No tickets exist for this time period",
                    "sInfo": "Showing _START_ to _END_ of _TOTAL_ items",
                },
                "aoColumns": [
                                        { },
                                        { "bVisible": false},                           // KitchenTiming Id
                    { "bVisible": true},                            // Server
                    { "bVisible": true},                            // Check #
                    { "bVisible": true},                            // Table
                    { "bVisible": false},                           // Check Opened
                    { "bVisible": true, "bSortable": false},        // Prep Station
                    { "bVisible": true, "bSortable": false},        // Expediter Level
                    { "bVisible": true},                            // Fired Date
                    { "bVisible": true},                            // Fulfilled Date
                    { "bVisible": true, "bSortable": true, "asSorting": [ "desc", "asc"]},
                    { "bVisible": true}                             // Fulfilled By
                ],
                "aaSorting":[[8, "desc"]],
                "fnCreatedRow": Toast.reporting.orderDetails.onCreatedRow(function(nRow, aData, iDataIndex) {
                    return '/restaurants/admin/reports/orderdetail?kitchenTimingId=' + aData[1];
                })
            });
        });
    });

name: RDG Daily Forecast + Toast

# Runs in GitHub cloud — your laptop can be OFF.
# Schedule: 12:30 UTC ≈ 8:30 AM America/New_York (EDT)

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:

jobs:
  fourvenues-forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps + Playwright Chromium
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Write FourVenues session from secret
        env:
          FV_SESSION_B64: ${{ secrets.FV_SESSION_B64 }}
        run: |
          if [ -z "$FV_SESSION_B64" ]; then
            echo "Missing secret FV_SESSION_B64 — add base64 of fv-final-session.json"
            exit 1
          fi
          echo "$FV_SESSION_B64" | base64 -d > fv-final-session.json
          node -e "JSON.parse(require('fs').readFileSync('fv-final-session.json','utf8')); console.log('session ok')"

      - name: FourVenues Forecast → Firebase live
        env:
          FV_SESSION_PATH: ${{ github.workspace }}/fv-final-session.json
          FV_DATA_PATH: ${{ github.workspace }}/fv-bookings-data.json
          FV_HEADLESS: "1"
        run: node fv-refresh-cloud.cjs

  toast-bs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: []
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm install

      - name: Checkout DJ dashboard
        uses: actions/checkout@v4
        with:
          repository: MLavenant/rdg-dj
          token: ${{ secrets.RDG_DJ_TOKEN }}
          path: rdg-dj

      - name: Toast BS Actual update
        env:
          TOAST_CLIENT_ID: ${{ secrets.TOAST_CLIENT_ID }}
          TOAST_API_SECRET: ${{ secrets.TOAST_API_SECRET }}
          DASHBOARD_PATH: ${{ github.workspace }}/rdg-dj/index.html
        run: node toast-bs-cloud.cjs

      - name: Push dashboard if changed
        working-directory: rdg-dj
        run: |
          git config user.name "rdg-bot"
          git config user.email "rdg-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "No dashboard changes" && exit 0
          git commit -m "Auto-refresh: Toast BS Actual (cloud)"
          git push
